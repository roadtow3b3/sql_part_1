version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: merklelearn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: merklelearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_demo_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merklelearn"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
